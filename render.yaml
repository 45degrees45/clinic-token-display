databases:
  - name: clinic-token-db
    plan: free
    databaseName: clinicqueue
    user: clinicuser

services:
  - type: web
    name: clinic-token-display
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-token-db
          property: connectionString
